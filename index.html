<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyaz Barış Hava Koridoru - Antigravity Era</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; touch-action: none; }
        .cityNav::-webkit-scrollbar, div:has(>.cityNav)::-webkit-scrollbar { display: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
        canvas:active { cursor: grabbing; }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ui-overlay.hidden-menu {
            transform: translateY(-110%);
            opacity: 0;
            pointer-events: none;
        }

        .card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            color: white;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }

        .city-list {
            font-size: 0.75rem;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }
        .city-list::-webkit-scrollbar { height: 3px; }
        .city-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .legend {
            position: absolute;
            bottom: 70px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .sun-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: linear-gradient(to right, #1a1a3e, #f59e0b, #1a1a3e);
            border-radius: 4px;
            outline: none;
        }
        .sun-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.6);
        }

        /* Normal music panel display */
        #musicPanelSlot {
            display: flex !important;
            align-items: center;
            pointer-events: auto;
        }

        #musicPlaylistPanel {
            display: flex !important;
            pointer-events: auto;
        }

        /* Floating music panel for TOS mode */
        #musicPlaylistPanel.floating {
            position: fixed !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 300 !important;
            margin: 0 !important;
            gap: 8px !important;
            background: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(10px);
            padding: 10px 14px !important;
            border-radius: 10px !important;
            border: 1px solid rgba(100, 150, 255, 0.4) !important;
        }

        .bottom-bar.tos-music-only {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 320;
            justify-content: center;
            gap: 0;
            padding: 0 0 120px;
            background: transparent;
            backdrop-filter: none;
            border-top: none;
            pointer-events: auto;
        }

        .bottom-bar.tos-music-only > * {
            display: none !important;
        }

        .bottom-bar.tos-music-only #musicPanelSlot {
            display: flex !important;
            align-items: center;
            pointer-events: auto;
        }

        .bottom-bar.tos-music-only #musicPlaylistPanel {
            display: flex !important;
            margin-left: 0 !important;
            padding: 10px 14px !important;
            gap: 8px !important;
            border-left: none !important;
            background: rgba(0, 0, 0, 0.86) !important;
            backdrop-filter: blur(10px);
            border-radius: 10px !important;
            border: 1px solid rgba(100, 150, 255, 0.45) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            pointer-events: auto;
        }

        .toggle-btn-ui {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: none;
            transition: all 0.2s;
        }

        .toggle-btn-ui:hover { background: rgba(255, 255, 255, 0.2); }

        .close-btn {
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 2px;
            flex-shrink: 0;
        }
        .close-btn:hover { color: white; }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .city-tag {
            background: rgba(255,255,255,0.08);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            flex-shrink: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; border-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <button id="openMenuBtn" class="toggle-btn-ui" onclick="toggleMenu(false)">
        ☰ Menüyü Göster
    </button>

    <div id="mainOverlay" class="ui-overlay">
        <div class="card">
            <h1 class="text-sm font-bold tracking-tight text-white" style="flex-shrink:0;">Beyaz Barış Koridoru</h1>

            <div class="controls-group">
                <!-- Layer select combobox -->
                <div class="control-item" style="position:relative;">
                    <span class="text-[10px] text-gray-300">Katmanlar</span>
                    <button id="layerComboBtn" style="font-size:10px;background:rgba(60,60,100,0.7);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:6px;padding:3px 8px;cursor:pointer;min-width:80px;text-align:left;">Tümü ▾</button>
                    <div id="layerComboList" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:rgba(0,0,0,0.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 8px;min-width:160px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.7);">
                        <div style="display:flex;gap:4px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.15);">
                            <button id="layerSelectAll" style="flex:1;font-size:9px;background:rgba(0,200,100,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">✅ Tümünü Seç</button>
                            <button id="layerDeselectAll" style="flex:1;font-size:9px;background:rgba(200,50,50,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">❌ Tümünü Bırak</button>
                        </div>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.08);"><input type="checkbox" class="layerChk" data-layer="bk" checked style="accent-color:#fff;"><span style="width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;border:1px solid rgba(255,255,255,0.3);"></span><b>Beyaz Kuşak</b></label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="at" checked style="accent-color:#22cc66;"><span style="width:8px;height:8px;border-radius:50%;background:#22cc66;display:inline-block;"></span>Atlantik</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="ak" checked style="accent-color:#ff8833;"><span style="width:8px;height:8px;border-radius:50%;background:#ff8833;display:inline-block;"></span>Akdeniz-Afrika</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="pa" checked style="accent-color:#3399ff;"><span style="width:8px;height:8px;border-radius:50%;background:#3399ff;display:inline-block;"></span>Pasifik-Asya</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="am" checked style="accent-color:#dd44aa;"><span style="width:8px;height:8px;border-radius:50%;background:#dd44aa;display:inline-block;"></span>Amerika</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="ba" checked style="accent-color:#ccaa22;"><span style="width:8px;height:8px;border-radius:50%;background:#ccaa22;display:inline-block;"></span>Batı Afrika</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="oa" checked style="accent-color:#00cccc;"><span style="width:8px;height:8px;border-radius:50%;background:#00cccc;display:inline-block;"></span>Orta Asya</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="layerChk" data-layer="pg" checked style="accent-color:#77ff33;"><span style="width:8px;height:8px;border-radius:50%;background:#77ff33;display:inline-block;"></span>Pasifik-Güney</label>
                    </div>
                </div>
                <!-- Feature controls combobox -->
                <div class="control-item" style="position:relative;">
                    <span class="text-[10px] text-gray-300">Özellikler</span>
                    <button id="featComboBtn" style="font-size:10px;background:rgba(60,60,100,0.7);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:6px;padding:3px 8px;cursor:pointer;min-width:70px;text-align:left;">🚚⚡🏙📐 ▾</button>
                    <div id="featComboList" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:rgba(0,0,0,0.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 8px;min-width:140px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.7);">
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="featChk" data-feat="trade" checked>🚚 Ticaret</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="featChk" data-feat="energy" checked>⚡ Enerji</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="featChk" data-feat="cities" checked>🏙 Şehirler</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="featChk" data-feat="meb" checked>📐 MEB</label>
                        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#fff;padding:3px 0;"><input type="checkbox" class="featChk" data-feat="satellites" checked>🛰 Uydular</label>
                    </div>
                </div>
                <!-- Rotation bar -->
                <div class="control-item" style="gap:3px;">
                    <span class="text-[10px] text-gray-300">Dönüş</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <button id="rotPlayBtn" style="font-size:11px;background:rgba(0,200,100,0.6);border:none;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;">▶️</button>
                        <input type="range" id="rotSpeedSlider" min="0" max="400" value="100" step="10" style="width:60px;height:12px;accent-color:#00ccff;cursor:pointer;">
                        <span id="rotSpeedLabel" style="font-size:9px;color:#00ccff;font-weight:bold;min-width:20px;">1x</span>
                    </div>
                </div>
                <!-- TNB: Inter-city connections -->
                <div class="control-item" style="gap:3px;padding-left:6px;border-left:1px solid rgba(255,255,255,0.15);">
                    <span class="text-[10px] text-gray-300" title="Tüm Noktalar Arası Bağlantı">TNB</span>
                    <input type="range" id="tnbSlider" min="0" max="100" value="0" step="5" style="width:55px;height:12px;accent-color:#ff6600;cursor:pointer;">
                    <span id="tnbLabel" style="font-size:9px;color:#ff6600;font-weight:bold;min-width:18px;">0</span>
                    <button id="tnbAutoBtn" title="TNB Gece/Gündüz Senkron" style="font-size:10px;background:rgba(255,100,0,0.4);border:none;color:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">▶️</button>
                </div>
            </div>
            <div class="close-btn" onclick="toggleMenu(true)" style="margin-left:auto;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
            <div class="close-btn" onclick="hideAllUI()" title="Tümünü Gizle" style="margin-left:2px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </div>
        </div>
        <!-- Row 2: Cinematic tour + zoom + cities -->
        <div style="display:flex;align-items:center;gap:6px;padding:2px 12px 4px;flex-wrap:wrap;">
            <span style="font-size:9px;color:#888;">Tur</span>
            <button class="tourBtn" data-route="bk" title="Beyaz Kuşak Turu" style="font-size:9px;background:rgba(255,255,255,0.25);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">⬜BK</button>
            <button class="tourBtn" data-route="at" title="Atlantik Turu" style="font-size:9px;background:rgba(34,204,102,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🟢AT</button>
            <button class="tourBtn" data-route="ak" title="Akdeniz-Afrika Turu" style="font-size:9px;background:rgba(255,136,51,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🟠AK</button>
            <button class="tourBtn" data-route="pa" title="Pasifik-Asya Turu" style="font-size:9px;background:rgba(51,153,255,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🔵PA</button>
            <button class="tourBtn" data-route="am" title="Amerika Turu" style="font-size:9px;background:rgba(221,68,170,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🟣AM</button>
            <button class="tourBtn" data-route="ba" title="Batı Afrika Turu" style="font-size:9px;background:rgba(204,170,34,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🟡BA</button>
            <button class="tourBtn" data-route="oa" title="Orta Asya Turu" style="font-size:9px;background:rgba(0,204,204,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🔵OA</button>
            <button class="tourBtn" data-route="pg" title="Pasifik-Güney Turu" style="font-size:9px;background:rgba(119,255,51,0.4);border:none;color:#fff;border-radius:4px;padding:2px 4px;cursor:pointer;">🟢PG</button>
            <button class="tourBtn" data-route="all" title="Tüm Hatlar Turu" style="font-size:9px;background:rgba(200,50,200,0.5);border:none;color:#fff;border-radius:4px;padding:2px 5px;cursor:pointer;font-weight:bold;">🎬 Tümü</button>
            <button id="tosBtn" title="Tam Otomatik Sinema" style="font-size:9px;background:rgba(255,200,0,0.5);border:none;color:#fff;border-radius:4px;padding:2px 5px;cursor:pointer;font-weight:bold;">🎥 TOS</button>
            <button id="yscsBtn" title="Yurtta Sulh Cihanda Sulh — Şehir Hover Modu" style="font-size:9px;background:rgba(100,200,255,0.4);border:none;color:#fff;border-radius:4px;padding:2px 5px;cursor:pointer;font-weight:bold;">YSCS</button>
            <span style="font-size:7px;color:#555;margin-left:2px;">|</span>
            <span style="font-size:7px;color:#888;">📷</span>
            <button class="zoomBtn" data-zoom="8" style="font-size:7px;background:rgba(0,200,255,0.3);border:none;color:#fff;border-radius:3px;padding:1px 4px;cursor:pointer;">Yakın</button>
            <button class="zoomBtn" data-zoom="11" style="font-size:7px;background:rgba(0,200,255,0.5);border:1px solid rgba(0,200,255,0.6);color:#fff;border-radius:3px;padding:1px 4px;cursor:pointer;">Orta</button>
            <button class="zoomBtn" data-zoom="16" style="font-size:7px;background:rgba(0,200,255,0.3);border:none;color:#fff;border-radius:3px;padding:1px 4px;cursor:pointer;">Uzak</button>
            <span style="font-size:7px;color:#555;margin-left:2px;">|</span>
            <div style="display:flex;gap:2px;overflow-x:auto;max-width:320px;scrollbar-width:none;-ms-overflow-style:none;">
                <button class="cityNav" data-lat="35.68" data-lon="139.65" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Tokyo</button>
                <button class="cityNav" data-lat="37.57" data-lon="126.98" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Seul</button>
                <button class="cityNav" data-lat="36.06" data-lon="103.83" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Gansu</button>
                <button class="cityNav" data-lat="41.17" data-lon="80.26" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Aksu</button>
                <button class="cityNav" data-lat="39.77" data-lon="64.43" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Buhara</button>
                <button class="cityNav" data-lat="40.41" data-lon="49.87" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Bakü</button>
                <button class="cityNav" data-lat="39.93" data-lon="32.86" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Ankara</button>
                <button class="cityNav" data-lat="41.90" data-lon="12.50" style="font-size:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.15);color:#ddd;border-radius:3px;padding:1px 4px;cursor:pointer;white-space:nowrap;">Roma</button>

    <script>
        let isRotationActive = true;
        let rotationSpeed = 1.0; // 0 to 4
        let isFlightActive = true;
        let flightVisible = true;
        let isLabelsActive = true;
        let isEnergyActive = true;

        // Rotation speed bar
        const rotSpeedSlider = document.getElementById('rotSpeedSlider');
        const rotPlayBtn = document.getElementById('rotPlayBtn');
        rotSpeedSlider.addEventListener('input', (e) => {
            rotationSpeed = parseInt(e.target.value) / 100;
            document.getElementById('rotSpeedLabel').textContent = rotationSpeed.toFixed(1) + 'x';
            if (rotationSpeed > 0 && !isRotationActive) {
                isRotationActive = true;
                rotPlayBtn.textContent = '⏸️';
                rotPlayBtn.style.background = 'rgba(200,200,0,0.7)';
            }
        });
        rotPlayBtn.addEventListener('click', () => {
            isRotationActive = !isRotationActive;
            rotPlayBtn.textContent = isRotationActive ? '⏸️' : '▶️';
            rotPlayBtn.style.background = isRotationActive ? 'rgba(200,200,0,0.7)' : 'rgba(0,200,100,0.7)';
        });
        // Old toggle handlers removed - now handled by .featChk checkboxes
        // Corridor width slider
        let corridorScale = 1.0; // ratio to base 1600km
        document.getElementById('corridorWidthSlider').addEventListener('input', (e) => {
            const km = parseInt(e.target.value);

        // Extract lat/lon from a 3D point on the curve
        function posToLatLon(pos) {
            const r = pos.length();
            const lat = 90 - Math.acos(pos.y / r) * 180 / Math.PI;
            const theta = Math.atan2(pos.z, -pos.x);
            const lon = ((theta * 180 / Math.PI - 180) % 360 + 540) % 360 - 180;
            return { lat, lon };
        }

        // Only Eurasia land (excluding Mediterranean, Black Sea, Caspian)
        function isEurasiaLandLL(lat, lon) {
            if (lon < -10 || lon > 145) return false;
            // Mediterranean gap: lon -5 to 10, lat 34-44
            if (lon >= -5 && lon <= 10 && lat >= 34 && lat <= 44) return false;
            // Black Sea gap: lon 28-42, lat 41-46
            if (lon >= 28 && lon <= 42 && lat >= 41 && lat <= 46) return false;
            // Caspian gap: lon 48-55, lat 36-47
            if (lon >= 48 && lon <= 55 && lat >= 36 && lat <= 47) return false;
            return true;
        }

        function createCorridorRoute(routeCities, color, tubeOpacity) {
            const group = new THREE.Group();
            const routeLabels = new THREE.Group();
            const routeRadius = 5.3;
            const pts = [];
            for (let i = 0; i < routeCities.length - 1; i++) {
                const cur = routeCities[i];
                const next = routeCities[i + 1];
                const segs = 20;
                for (let j = 0; j < segs; j++) {
                    const t = j / segs;
                    const lat = cur.lat + (next.lat - cur.lat) * t;
                    let dLon = next.lon - cur.lon;
                    if (dLon > 180) dLon -= 360;
                    if (dLon < -180) dLon += 360;
                    const lon = cur.lon + dLon * t;
                    pts.push(latLonToVector3(lat, lon, routeRadius));
                }
            }
            const lastC = routeCities[routeCities.length - 1];
            pts.push(latLonToVector3(lastC.lat, lastC.lon, routeRadius));
            for (let i = 0; i < routeCities.length; i++) {
                const cur = routeCities[i];
                const mpos = latLonToVector3(cur.lat, cur.lon, 5.05);
                const marker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.025, 10, 10),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                marker.position.copy(mpos);
                group.add(marker);
                if (cur.name) {
                    const lbl = createTextLabel(cur.name);
                    lbl.position.copy(latLonToVector3(cur.lat, cur.lon, 5.65));
                    routeLabels.add(lbl);
                }
            }
            const routeCurve = new THREE.CatmullRomCurve3(pts, false);
            const tube = new THREE.Mesh(
                new THREE.TubeGeometry(routeCurve, 300, 0.35, 12, false),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: tubeOpacity, side: THREE.DoubleSide })
            );
            group.add(tube);
            group.add(routeLabels);

            // --- Traffic: 10 small planes along corridor ---
            const corridorPlanes = [];

                const { sprite, dayMat, nightMat } = createAirplaneSprite();
                sprite.scale.set(0.2, 0.2, 1);

                    mesh: sprite, dayMat, nightMat, mat: dayMat,

                    speed: 0.0002 + Math.random() * 0.0004,
                    direction: i % 2 === 0 ? 1 : -1,
                    lateralOffset: (Math.random() - 0.5) * 0.08
                });

                const eMat = new THREE.SpriteMaterial({

                    transparent: true, opacity: 0.7,
                    blending: THREE.AdditiveBlending,

                const eSprite = new THREE.Sprite(eMat);
                const sz = 0.02 + Math.random() * 0.02;
                eSprite.scale.set(sz, sz, 1);
                eSprite.renderOrder = 996;
                energyGroup.add(eSprite);
                corridorEnergy.push({
                    sprite: eSprite, mat: eMat,
                    offset: Math.random(),
                    speed: 0.001 + Math.random() * 0.003,
                    direction: i % 2 === 0 ? 1 : -1
                });
            }
            group.add(energyGroup);

            earthGroup.add(group);

            const result = { group, tube, labels: routeLabels, curve: routeCurve, planes: corridorPlanes, energy: corridorEnergy, energyGroup };
            allSubCorridors.push(result);
            return result;
        }

            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const cx = 32, cy = 32;
            // Glow aura
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
            glow.addColorStop(0, 'rgba(100,200,255,0.5)');
            glow.addColorStop(0.35, 'rgba(80,180,255,0.15)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, 64, 64);
            // Satellite body (golden rect)
            ctx.fillStyle = '#ddc060';
            ctx.fillRect(cx - 3, cy - 3, 6, 6);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(cx - 3, cy - 3, 6, 6);
            // Solar panel wings (blue)
            ctx.fillStyle = '#3366cc';
            ctx.fillRect(cx - 18, cy - 4, 13, 8);
            ctx.fillRect(cx + 5, cy - 4, 13, 8);
            // Panel grid lines
            ctx.strokeStyle = 'rgba(100,150,255,0.6)';
            ctx.lineWidth = 0.5;
            for (let x = cx - 17; x < cx - 5; x += 3) { ctx.beginPath(); ctx.moveTo(x, cy - 3); ctx.lineTo(x, cy + 3); ctx.stroke(); }
            for (let x = cx + 6; x < cx + 17; x += 3) { ctx.beginPath(); ctx.moveTo(x, cy - 3); ctx.lineTo(x, cy + 3); ctx.stroke(); }
            // Antenna
            ctx.strokeStyle = '#ff5555';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx, cy - 3); ctx.lineTo(cx, cy - 9); ctx.stroke();
            ctx.fillStyle = '#ff3333';
            ctx.beginPath(); ctx.arc(cx, cy - 9, 1.5, 0, Math.PI * 2); ctx.fill();
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, opacity: 0.9 });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.18, 0.18, 1);
            satelliteGroup.add(sprite);
            return { sprite, mat };
        }

        var cityNavTarget = null;

        function animate() {

            // Toggle plane visibility for OFF state + corridor scale

            // Ship visibility

            });
            // Land vehicle visibility
            if (typeof landVehicles !== 'undefined') landVehicles.forEach(v => {
                v.sprite.visible = flightVisible && (v.scaledVisible !== false);
            });
            if (isFlightActive) {
                camera.updateMatrixWorld();
                const _pos = new THREE.Vector3();
                const _ahead = new THREE.Vector3();
                // Sun direction for night/day detection
                const sunDir = sun.position.clone().normalize();
                const blinkTime = Date.now() * 0.006;
                function updateNightDay(obj, idx) {
                    const target = obj.mesh || obj.sprite;
                    _pos.copy(target.position);
                    earthGroup.localToWorld(_pos);
                    // Back-face cull: hide if on back side of globe
                    const pNorm = _pos.clone().normalize();
                    const camP = new THREE.Vector3();
                    camera.getWorldPosition(camP);
                    const toC = camP.sub(_pos).normalize();
                    if (pNorm.dot(toC) < -0.1) {
                        target.visible = false;
                        return;
                    }
                    target.visible = flightVisible;
                    const dot = pNorm.dot(sunDir);
                    const isNight = dot < 0.1;
                    if (isNight && obj.nightMat) {
                        target.material = obj.nightMat;
                        const blink = Math.sin(blinkTime + idx * 1.7) > 0 ? 1 : 0.3;
                        obj.nightMat.opacity = blink;
                        obj.nightMat.rotation = obj.dayMat.rotation;
                    } else if (obj.dayMat) {
                        target.material = obj.dayMat;
                    }
                }
                planes.forEach((p, i) => {
                    p.offset = (p.offset + p.speed * p.direction * corridorScale + 1) % 1;
                    const posOnCurve = curve.getPointAt(p.offset);
                    const tangent = curve.getTangentAt(p.offset).normalize();
                    const up = posOnCurve.clone().normalize();
                    const right = new THREE.Vector3().crossVectors(tangent, up).normalize();
                    if (p.isDrifter) {
                        p.lateralOffset += p.driftSpeed;
                        const absDrift = Math.abs(p.lateralOffset);
                        p.mat.opacity = Math.max(0, 1 - (absDrift / p.maxDrift));
                        if (absDrift > p.maxDrift) { p.lateralOffset = (Math.random() - 0.5) * 0.1; p.offset = Math.random(); p.mat.opacity = 1; }
                    }
                    p.mesh.position.copy(posOnCurve.clone().add(right.clone().multiplyScalar(p.lateralOffset)));
                    // Rotate sprite to face travel direction
                    const dir3D = tangent.clone().multiplyScalar(p.direction);
                    _pos.copy(p.mesh.position);
                    earthGroup.localToWorld(_pos);
                    _ahead.copy(p.mesh.position).add(dir3D.multiplyScalar(0.3));
                    earthGroup.localToWorld(_ahead);
                    const s1 = _pos.clone().project(camera);
                    const s2 = _ahead.clone().project(camera);
                    p.dayMat.rotation = -Math.atan2(s2.x - s1.x, s2.y - s1.y);
                    updateNightDay(p, i);
                });
                // Dispersal planes: fly outward from cities, fade out
                dispersalPlanes.forEach((dp, i) => {
                    dp.progress += dp.speed * corridorScale;
                    if (dp.progress > 1) {
                        dp.progress = 0;
                        dp.angle = Math.random() * Math.PI * 2;
                        dp.mat.opacity = 1;
                    }
                    const dist = dp.progress * dp.maxRange;
                    const latOff = Math.cos(dp.angle) * dist * 8;
                    const lonOff = Math.sin(dp.angle) * dist * 8;
                    const pos = latLonToVector3(dp.cityLat + latOff, dp.cityLon + lonOff, flightRadius);
                    dp.sprite.position.copy(pos);
                    dp.mat.opacity = Math.max(0, 1 - dp.progress * 1.2);
                    // Rotate dispersal plane to face outward direction
                    _pos.copy(dp.sprite.position);
                    earthGroup.localToWorld(_pos);
                    const nextDist = (dp.progress + 0.05) * dp.maxRange;
                    const nPos = latLonToVector3(dp.cityLat + Math.cos(dp.angle)*nextDist*8, dp.cityLon + Math.sin(dp.angle)*nextDist*8, flightRadius);
                    _ahead.copy(nPos);
                    earthGroup.localToWorld(_ahead);
                    const ds1 = _pos.clone().project(camera);
                    const ds2 = _ahead.clone().project(camera);
                    dp.dayMat.rotation = -Math.atan2(ds2.x - ds1.x, ds2.y - ds1.y);
                    updateNightDay(dp, i + 200);
                });
                // Breakaway planes: peel off corridor diagonally
                breakawayPlanes.forEach((bp, i) => {
                    bp.progress += bp.speed * corridorScale;
                    if (bp.progress > 1) {
                        bp.progress = 0;
                        bp.curveT = Math.random();
                        bp.departAngle = (Math.random() > 0.5 ? 1 : -1) * (0.15 + Math.random() * 0.35) * Math.PI;
                        bp.mat.opacity = 1;
                    }
                    const posOnCurve = curve.getPointAt(bp.curveT);
                    const tangent = curve.getTangentAt(bp.curveT).normalize();
                    const up = posOnCurve.clone().normalize();
                    const right = new THREE.Vector3().crossVectors(tangent, up).normalize();
                    // Departure direction: mix of up and right based on angle
                    const departDir = up.clone().multiplyScalar(Math.sin(bp.departAngle))
                        .add(right.clone().multiplyScalar(Math.cos(bp.departAngle)));
                    const dist = bp.progress * bp.maxDist;
                    const pos = posOnCurve.clone().add(departDir.multiplyScalar(dist));
                    bp.sprite.position.copy(pos);
                    bp.mat.opacity = Math.max(0, 1 - bp.progress * 1.3);
                    // Rotation
                    _pos.copy(bp.sprite.position);
                    earthGroup.localToWorld(_pos);
                    const nextDist = (bp.progress + 0.05) * bp.maxDist;
                    const nPos = posOnCurve.clone().add(
                        up.clone().multiplyScalar(Math.sin(bp.departAngle) * nextDist)
                        .add(right.clone().multiplyScalar(Math.cos(bp.departAngle) * nextDist))
                    );
                    _ahead.copy(nPos);
                    earthGroup.localToWorld(_ahead);
                    const bs1 = _pos.clone().project(camera);
                    const bs2 = _ahead.clone().project(camera);
                    bp.dayMat.rotation = -Math.atan2(bs2.x - bs1.x, bs2.y - bs1.y);
                    updateNightDay(bp, i + 300);
                });
            }
            // Maritime ship animation (ocean corridor)
            if (isFlightActive && typeof ships !== 'undefined') {
                const _spos = new THREE.Vector3();
                const _sahead = new THREE.Vector3();
                ships.forEach(s => {
                    s.offset += s.speed * s.direction * corridorScale;
                    if (s.offset > 1) s.offset -= 1;
                    if (s.offset < 0) s.offset += 1;
                    // Check if ship is over land — if so, respawn at ocean
                    const checkPos = curve.getPointAt(s.offset);
                    const theta = Math.atan2(checkPos.z, -checkPos.x);
                    const lon = ((theta * 180 / Math.PI - 180) % 360 + 540) % 360 - 180;
                    if (isOverLand(lon)) {
                        s.offset = findOceanT();
                        s.direction = Math.random() > 0.5 ? 1 : -1;
                    }
                    const pos = curve.getPointAt(s.offset);
                    const tang = curve.getTangentAt(s.offset).normalize();
                    const normal = pos.clone().normalize();
                    const right = new THREE.Vector3().crossVectors(tang, normal).normalize();
                    const shipPos = pos.clone().add(right.multiplyScalar(s.lateralOffset));
                    shipPos.normalize().multiplyScalar(shipRadius);

                    // Rotate ship to face direction
                    _spos.copy(s.sprite.position);
                    earthGroup.localToWorld(_spos);
                    const aheadPos = curve.getPointAt((s.offset + 0.01 * s.direction + 1) % 1);
                    aheadPos.normalize().multiplyScalar(shipRadius);
                    _sahead.copy(aheadPos);
                    earthGroup.localToWorld(_sahead);
                    const s1 = _spos.clone().project(camera);
                    const s2 = _sahead.clone().project(camera);
                    s.mat.rotation = -Math.atan2(s2.x - s1.x, s2.y - s1.y);

            let a = cinemaKeyframes[0], b = cinemaKeyframes[1];

                if (t >= cinemaKeyframes[i].t && t <= cinemaKeyframes[i+1].t) {
                    a = cinemaKeyframes[i]; b = cinemaKeyframes[i+1]; break;
                }
            }
            if (t >= cinemaKeyframes[cinemaKeyframes.length-1].t) {
                a = b = cinemaKeyframes[cinemaKeyframes.length-1];

            const frac = a.t === b.t ? 1 : (t - a.t) / (b.t - a.t);
            const ease = frac * frac * (3 - 2 * frac); // smoothstep
            return {
                rotY: a.rotY + (b.rotY - a.rotY) * ease,
                rotX: a.rotX + (b.rotX - a.rotX) * ease,
                camZ: a.camZ + (b.camZ - a.camZ) * ease,

                text: frac < 0.5 ? a.text : b.text

        let lastPeaceCity = '';
        function showPeaceQuote(cityName) {
            const q = peaceQuotes[cityName];
            const el = document.getElementById('peaceQuote');
            if (!q || !el) { if (el) el.style.opacity = 0; return; }
            if (cityName === lastPeaceCity) return;

        }
        function latLonToRotation(lat, lon) {
            const rotY = -lon * Math.PI / 180 - Math.PI / 2;
            const rotX = lat * Math.PI / 180;
            return { rotY, rotX };
        }
        function startRouteTour(routeKey) {
            const rd = tourRouteData[routeKey];
            if (!rd) return;
            tourCities = rd.cities;
            tourRouteName = rd.name;
            tourCityIdx = 0;
            tourLerpT = 0;
            tourActive = true;
            isRotationActive = false;
            targetRotation = null;
            document.getElementById('cinemaOverlay').style.display = 'block';
            const tEl = document.getElementById('cinemaText');
            tEl.textContent = tourRouteName + ' — ' + tourCities[0].name;
            tEl.style.opacity = 1;
            document.querySelectorAll('.tourBtn').forEach(b => {
                b.style.outline = b.dataset.route === routeKey ? '2px solid #fff' : 'none';
            });
            // Snap globe to first city immediately
            const startRot = latLonToRotation(tourCities[0].lat, tourCities[0].lon);
            earthGroup.rotation.y = startRot.rotY;
            earthGroup.rotation.x = startRot.rotX;
            camera.position.z = tourZoomZ;
        }
        function updateRouteTour() {
            if (!tourActive || tourCities.length === 0) return;
            const pauseAt = 0.12;
            const totalSegments = tourCities.length - 1;
            if (totalSegments <= 0) { tourActive = false; return; }
            // BK has 12 cities: slower. Others: medium
            let transSpeed = tourCities.length > 8 ? 0.002 : 0.003;
            if (tourLerpT > 1.0) transSpeed *= 0.5; // return trip: half speed
            if (tosActive) transSpeed = 0.0003125; // TOS: slow fixed speed
            tourLerpT += transSpeed;
            // Round-trip: 0→1 = forward, 1→2 = reverse, 2→2.3 = zoom-out finale
            if (tourLerpT >= 2.3) {
                tourActive = false;
                document.getElementById('cinemaText').style.opacity = 0;
                document.querySelectorAll('.tourBtn').forEach(b => b.style.outline = 'none');
                if (tourQueue.length > 0) {
                    setTimeout(() => startRouteTour(tourQueue.shift()), 800);
                } else {
                    cinemaActive = false;
                    document.getElementById('cinemaOverlay').style.display = 'none';
                }
                return;
            }
            // Zoom-out finale phase
            if (tourLerpT >= 2.0) {
                camera.position.z += (25 - camera.position.z) * 0.04;
                const tEl = document.getElementById('cinemaText');
                const finaleText = tourRouteName + ' — Genel Bakış';
                if (tEl.textContent !== finaleText) {
                    tEl.style.opacity = 0;
                    setTimeout(() => { tEl.textContent = finaleText; tEl.style.opacity = 1; }, 300);
                }
                document.getElementById('cinemaTimer').textContent = '🌍';
                return;
            }
            // Map 0-2 to forward(0-1) then reverse(1-0)
            let effectiveT;
            let isReturn = false;
            if (tourLerpT <= 1.0) {
                effectiveT = tourLerpT;
            } else {
                effectiveT = 2.0 - tourLerpT;
                isReturn = true;
            }
            const rawSeg = effectiveT * totalSegments;
            const segIdx = Math.min(Math.floor(rawSeg), totalSegments - 1);
            let localT = rawSeg - segIdx;
            if (localT < pauseAt) localT = 0;
            else if (localT > 1 - pauseAt) localT = 1;
            else localT = (localT - pauseAt) / (1 - 2 * pauseAt);
            localT = localT * localT * (3 - 2 * localT);
            const cityA = tourCities[segIdx];
            const cityB = tourCities[segIdx + 1];
            const lat = cityA.lat + (cityB.lat - cityA.lat) * localT;
            const lon = cityA.lon + (cityB.lon - cityA.lon) * localT;
            const rot = latLonToRotation(lat, lon);
            earthGroup.rotation.y += (rot.rotY - earthGroup.rotation.y) * 0.06;
            earthGroup.rotation.x += (rot.rotX - earthGroup.rotation.x) * 0.06;
            // Auto zoom: far on forward, closer on return
            const activeZoom = isReturn ? tourZoomZ * 0.65 : tourZoomZ;
            camera.position.z += (activeZoom - camera.position.z) * 0.03;
            const showCity = localT < 0.5 ? cityA : cityB;
            const dirLabel = isReturn ? ' ◀ Dönüş' : ' ▶ Gidiş';
            const tEl = document.getElementById('cinemaText');
            const newText = showCity.name + ' — ' + tourRouteName + dirLabel;
            if (tEl.textContent !== newText) {
                tEl.style.opacity = 0;
                setTimeout(() => { tEl.textContent = newText; tEl.style.opacity = 1; }, 300);
                showPeaceQuote(showCity.name);
            }
            document.getElementById('cinemaTimer').textContent =
                Math.floor(tourLerpT / 2 * 100) + '%';
        }

        // YSCS hover check runs inside animate loop — add to end of animate
        function checkYSCSHover() {
            if (!yscsActive) return;
            const tooltip = document.getElementById('yscsTooltip');
            // Build all cities from all tour routes + main corridor
            const allCitiesMap = {};
            cities.forEach(c => { allCitiesMap[c.name] = c; });
            Object.values(tourRouteData).forEach(rd => {
                rd.cities.forEach(c => { if (!allCitiesMap[c.name]) allCitiesMap[c.name] = c; });
            });
            const allCities = Object.values(allCitiesMap);
            let closest = null, minDist = 50;
            allCities.forEach(c => {
                const pos3 = latLonToVector3(c.lat, c.lon, 5.0);
                const worldPos = pos3.clone();
                earthGroup.localToWorld(worldPos);
                // Back-face cull: skip cities on the back of globe
                const camPos = new THREE.Vector3();
                camera.getWorldPosition(camPos);
                const toCamera = camPos.clone().sub(worldPos).normalize();
                const surfaceNormal = worldPos.clone().normalize();
                if (toCamera.dot(surfaceNormal) < 0.1) return;
                // Project to screen
                const projected = worldPos.clone().project(camera);
                const sx = (projected.x * 0.5 + 0.5) * window.innerWidth;
                const sy = (-projected.y * 0.5 + 0.5) * window.innerHeight;
                if (projected.z > 1) return;
                const dist = Math.sqrt((sx - yscsMouse.x) ** 2 + (sy - yscsMouse.y) ** 2);
                if (dist < minDist) { minDist = dist; closest = c; }
            });
            if (closest && peaceQuotes[closest.name]) {
                const q = peaceQuotes[closest.name];
                document.getElementById('yscsCity').textContent = closest.name;
                document.getElementById('yscsLatin').textContent = q.latin;
                document.getElementById('yscsNative').textContent = q.native || '';
                tooltip.style.display = 'block';
                tooltip.style.left = (yscsMouse.x + 15) + 'px';
                tooltip.style.top = (yscsMouse.y - 60) + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        }

        // City navigation buttons
        document.querySelectorAll('.cityNav').forEach(btn => {
            btn.addEventListener('click', () => {
                const lat = parseFloat(btn.dataset.lat);
                const lon = parseFloat(btn.dataset.lon);
                const rot = latLonToRotation(lat, lon);
                cityNavTarget = { rotY: rot.rotY, rotX: rot.rotX, framesLeft: 60 };

                document.querySelectorAll('.cityNav').forEach(b => b.style.background = 'rgba(255,255,255,0.12)');
                btn.style.background = 'rgba(0,255,255,0.3)';

        });

        // Zoom level buttons for cinematic tours
        document.querySelectorAll('.zoomBtn').forEach(btn => {
